    name: Line A

  - id: lineB
    name: Line B

stages:
  - id: stage1
    name: Heating

  - id: stage2
    name: Rolling

  - id: stage3
    name: Cooling

  - id: stage4
    name: Packaging

stations:
  - id: inspect1
    name: Camera A

  - id: inspect2
    name: Camera B

  - id: inspect3
