    - [lineA, stage2]

    - [lineB, stage3]
    - [lineB, stage4]

  feedsInto:
    - [stage1, stage2]
    - [stage2, stage3]
    - [stage3, stage4]

  inspectedBy:
    - [stage2, inspect1]
    - [stage3, inspect2]
    - [stage4, inspect3]